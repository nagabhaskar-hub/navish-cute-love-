<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Siri ❤️</title>

<style>
body{
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right,#ff758c,#ff7eb3);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    text-align:center;
    background:white;
    padding:40px;
    border-radius:20px;
    width:350px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    color:#ff4d6d;
}

p{
    color:#444;
    font-size:18px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:30px;
    margin:10px;
    font-size:18px;
    cursor:pointer;
}

.yes{
    background:#ff4d6d;
    color:white;
}

.no{
    background:#444;
    color:white;
}

#result{
    margin-top:20px;
    font-size:22px;
    color:#ff4d6d;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>Siri ❤️</h1>

<p>
Krish loves you endlessly 💖<br><br>
Every moment with you feels special ✨<br><br>

Will you accept my love?
</p>

<button class="yes" onclick="yesLove()">Yes ❤️</button>
<button class="no" onclick="noLove()">No 💔</button>

<div id="result"></div>

</div>

<script>
function yesLove(){
document.getElementById("result").innerHTML =
"❤️ Siri accepted Krish's love ❤️";
}

function noLove(){
document.getElementById("result").innerHTML =
"💔 But Krish will always care for Siri 💖";
}
</script>

</body>
</html>
